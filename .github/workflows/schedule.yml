name: Scheduled Telegram Message

on:
  schedule:
    # Monday KST 08:00 = Sunday UTC 23:00
    - cron: "0 23 * * 0"
    # Wednesday KST 22:00 = Wednesday UTC 13:00
    - cron: "0 13 * * 3"
    # Friday KST 08:00 = Thursday UTC 23:00
    - cron: "0 23 * * 4"
  workflow_dispatch:
    inputs:
      message_type:
        description: Message to send
        required: true
        default: weekday
        type: choice
        options:
          - weekday
          - sunday
          - group

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TYPE: ${{ github.event.inputs.message_type }}
        run: python send_msg.py
